<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hoodie Delivery</title>
    <link rel="stylesheet" href="style1.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>
<script>
    document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    alert("Your hoodie is on the way 🚚💗");
});
</script>
<div class="container">

    <div class="form-box">

        <h2><i class="fa-solid fa-truck"></i> Hoodie Delivery</h2>
        <p class="subtitle">Fill your details to receive your hoodie 💗</p>

        <form id="registerForm">

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" placeholder="Address" required>
            </div>

            <div class="row">
                <div class="input-box">
                    <i class="fa-solid fa-shirt"></i>
                    <select required>
                        <option value="">Size</option>
                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                    </select>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-palette"></i>
                    <select required>
                        <option value="">Color</option>
                        <option>Pink</option>
                        <option>Gray</option>
                        <option>Black</option>
                        <option>White</option>
                    </select>
                </div>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-pen"></i>
                <textarea placeholder="Notes (optional)"></textarea>
            </div>

            <button type="submit">Confirm Order</button>

        </form>

    </div>

</div>

<script src="register.js"></script>

</body>
</html>
